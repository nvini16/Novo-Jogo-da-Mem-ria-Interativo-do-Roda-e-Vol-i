<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Quicksand:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <title>O primeiro jogo do catálogo | Venha conferir</title>
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 20px rgba(250,204,21,0.4)} 50%{box-shadow:0 0 40px rgba(250,204,21,0.8)} }
    @keyframes spin-slow { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    @keyframes card-flip { 0%{transform:rotateY(0)} 50%{transform:rotateY(90deg)} 100%{transform:rotateY(0)} }
    .anim-float { animation: float 3s ease-in-out infinite; }
    .anim-float-d { animation: float 3s ease-in-out 0.5s infinite; }
    .anim-fade-1 { animation: fadeUp 0.8s ease both 0.2s; }
    .anim-fade-2 { animation: fadeUp 0.8s ease both 0.5s; }
    .anim-fade-3 { animation: fadeUp 0.8s ease both 0.8s; }
    .anim-fade-4 { animation: fadeUp 0.8s ease both 1.1s; }
    .anim-fade-5 { animation: fadeUp 0.8s ease both 1.4s; }
    .anim-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .anim-spin { animation: spin-slow 20s linear infinite; }
    .card-anim { animation: card-flip 2s ease-in-out infinite; }
    .card-anim-d { animation: card-flip 2s ease-in-out 0.7s infinite; }
    .card-anim-d2 { animation: card-flip 2s ease-in-out 1.4s infinite; }
    body { box-sizing: border-box; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(145deg, #1e3a5f 0%, #0f2440 40%, #1a1a2e 100%); font-family: 'Quicksand', sans-serif;">
   <div class="absolute top-0 right-0 w-64 h-64 opacity-10 anim-spin" style="pointer-events:none;">
    <svg viewbox="0 0 200 200">
     <circle cx="100" cy="100" r="90" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="20 15" /> <circle cx="100" cy="100" r="60" fill="none" stroke="#facc15" stroke-width="1" stroke-dasharray="10 10" />
    </svg>
   </div>
   <div class="relative z-10 flex flex-col items-center justify-center min-h-full px-4 py-8">
    <div class="anim-fade-1 mb-4">
     <span id="el-badge" class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-bold tracking-widest uppercase" style="background:rgba(250,204,21,0.15); color:#facc15; border:1px solid rgba(250,204,21,0.3);"> <i data-lucide="sparkles" style="width:14px;height:14px;"></i> NOVIDADE </span>
    </div>
    <h2 id="el-brand" class="anim-fade-1 text-center tracking-wider uppercase text-sm font-bold mb-2" style="color:#60a5fa; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:4px;">Roda de Vôlei</h2>
    <p class="anim-fade-1 text-center text-xs mb-6" style="color:rgba(250,204,21,0.6);">Catálogo de Jogos &amp; Passatempos</p>
    <div class="anim-fade-2 flex items-end justify-center gap-3 mb-8">
     <div class="card-anim w-16 h-20 rounded-xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#facc15,#f59e0b); transform-style:preserve-3d;">
      <span class="text-2xl">🏐</span>
     </div>
     <div class="card-anim-d w-20 h-24 rounded-xl flex items-center justify-center shadow-xl" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8); transform-style:preserve-3d;">
      <span class="text-3xl">❓</span>
     </div>
     <div class="card-anim-d2 w-16 h-20 rounded-xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,#facc15,#f59e0b); transform-style:preserve-3d;">
      <span class="text-2xl">🏐</span>
     </div>
    </div>
    <h1 id="el-title" class="anim-fade-3 text-center font-bold leading-tight" style="font-family:'Bebas Neue',sans-serif; font-size:52px; color:#facc15; text-shadow: 0 0 30px rgba(250,204,21,0.3);">Jogo da Memória</h1>
    <p id="el-subtitle" class="anim-fade-3 text-center max-w-xs mt-2 mb-8" style="color:#93c5fd; font-size:16px; line-height:1.6;">O primeiro passatempo do catálogo!</p>
    <div class="anim-fade-4 flex flex-wrap justify-center gap-3 mb-8">
     <div class="flex items-center gap-2 px-3 py-2 rounded-lg" style="background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.25);">
      <i data-lucide="users" style="width:16px;height:16px;color:#60a5fa;"></i> <span class="text-xs font-semibold" style="color:#93c5fd;">2+ Jogadores</span>
     </div>
     <div class="flex items-center gap-2 px-3 py-2 rounded-lg" style="background:rgba(250,204,21,0.1); border:1px solid rgba(250,204,21,0.25);">
      <i data-lucide="zap" style="width:16px;height:16px;color:#facc15;"></i> <span class="text-xs font-semibold" style="color:#fde68a;">Fácil &amp; Divertido</span>
     </div>
     <div class="flex items-center gap-2 px-3 py-2 rounded-lg" style="background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.25);">
      <i data-lucide="trophy" style="width:16px;height:16px;color:#60a5fa;"></i> <span class="text-xs font-semibold" style="color:#93c5fd;">Tema Vôlei</span>
     </div>
    </div>
    <div class="anim-fade-5">
      
      
      <button onclick="window.location.href="https://nvini16.github.io/Cat-logo-de-jogos-/"
   id="el-cta"
   class="anim-glow px-8 py-3 rounded-full font-bold text-lg tracking-wide transition-transform hover:scale-105 active:scale-95"
   style="background:linear-gradient(135deg,#facc15,#eab308); color:#1e3a5f; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:22px;">
   Garanta o Seu!
</button>
    </div>
    <p id="el-footer" class="anim-fade-5 mt-8 text-center text-xs font-semibold tracking-widest uppercase" style="color:rgba(250,204,21,0.4);">@rodadevolei</p>
   </div>
  </div>
  <script>
const defaultConfig = {
  brand_name: "Roda de Vôlei",
  main_title: "Jogo da Memória",
  subtitle_text: "O mais novo passatempo do catálogo!",
  cta_text: "Garanta o Seu!",
  footer_text: "@rodadevolei",
  background_color: "#0f2440",
  surface_color: "#1e3a5f",
  text_color: "#93c5fd",
  primary_action_color: "#facc15",
  secondary_action_color: "#3b82f6",
  font_family: "Quicksand",
  font_size: 16
};

function applyConfig(c) {
  const el = (id) => document.getElementById(id);
  const cfg = (k) => c[k] || defaultConfig[k];

  el('el-brand').textContent = cfg('brand_name');
  el('el-title').textContent = cfg('main_title');
  el('el-subtitle').textContent = cfg('subtitle_text');
  el('el-cta').textContent = cfg('cta_text');
  el('el-footer').textContent = cfg('footer_text');

  const bg = cfg('background_color');
  const surface = cfg('surface_color');
  const text = cfg('text_color');
  const primary = cfg('primary_action_color');
  const secondary = cfg('secondary_action_color');
  const font = cfg('font_family');
  const size = cfg('font_size');

  el('app').style.background = `linear-gradient(145deg, ${surface} 0%, ${bg} 40%, ${bg} 100%)`;
  el('app').style.fontFamily = `${font}, Quicksand, sans-serif`;
  el('el-brand').style.color = secondary;
  el('el-title').style.color = primary;
  el('el-title').style.fontSize = `${size * 3.25}px`;
  el('el-subtitle').style.color = text;
  el('el-subtitle').style.fontSize = `${size}px`;
  el('el-cta').style.background = `linear-gradient(135deg, ${primary}, ${primary})`;
  el('el-cta').style.color = bg;
  el('el-cta').style.fontSize = `${size * 1.375}px`;
  el('el-footer').style.color = primary + '66';
  el('el-brand').style.fontFamily = `${font}, Bebas Neue, sans-serif`;
  el('el-brand').style.fontSize = `${size * 1.125}px`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
  }),
  mapToEditPanelValues: (config) => new Map([
    ["brand_name", config.brand_name || defaultConfig.brand_name],
    ["main_title", config.main_title || defaultConfig.main_title],
    ["subtitle_text", config.subtitle_text || defaultConfig.subtitle_text],
    ["cta_text", config.cta_text || defaultConfig.cta_text],
    ["footer_text", config.footer_text || defaultConfig.footer_text],
  ])
});

lucide.createIcons();
  </script>

</html>
